worker_processes 1;
events { worker_connections 1024; }

http {
  # Public DNS so nginx can resolve the Azure host at runtime (China-reachable resolvers).
  resolver 119.29.29.29 114.114.114.114 valid=300s;
  resolver_timeout 5s;
  access_log /dev/stdout;
  error_log /dev/stderr;

  server {
    listen 80;
    server_name _;

    # 云托管 health probe
    location = /healthz {
      return 200 "ok";
      add_header Content-Type text/plain;
    }

    # Everything else is forwarded to the existing Azure backend's API.
    # The mini program calls callContainer with path "/pet", "/action", etc.;
    # we map "/<path>" -> "https://<azure>/cloudpet/api/<path>".
    location / {
      set $azure "ai-native.japaneast.cloudapp.azure.com";
      proxy_pass https://$azure/cloudpet/api$request_uri;
      proxy_http_version 1.1;
      proxy_set_header Host $azure;
      proxy_ssl_server_name on;
      proxy_ssl_name $azure;
      # keep the app's auth header + WeChat-injected identity headers
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_connect_timeout 10s;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }
  }
}
